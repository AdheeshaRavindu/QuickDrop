<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Send Files Without Internet</title>
  <desc id="desc">Illustration of phone and laptop connected directly for peer-to-peer file sharing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#eefcf4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#067a69"/>
      <stop offset="100%" stop-color="#118f7c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="190" cy="110" r="90" fill="#9fd8ff" opacity="0.35"/>
  <circle cx="1010" cy="540" r="130" fill="#ffd1b4" opacity="0.35"/>
  <rect x="180" y="150" width="290" height="420" rx="34" fill="#ffffff" stroke="#cfdff0" stroke-width="8"/>
  <rect x="210" y="205" width="230" height="300" rx="18" fill="#f8fbff"/>
  <rect x="560" y="170" width="470" height="320" rx="18" fill="#ffffff" stroke="#cfdff0" stroke-width="8"/>
  <rect x="600" y="220" width="390" height="220" rx="12" fill="#f8fbff"/>
  <rect x="540" y="500" width="510" height="24" rx="12" fill="#d7e4f2"/>
  <path d="M450 330 C530 250, 680 250, 760 330" stroke="url(#accent)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M450 390 C530 470, 680 470, 760 390" stroke="url(#accent)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <circle cx="450" cy="360" r="30" fill="#067a69"/>
  <circle cx="760" cy="360" r="30" fill="#118f7c"/>
  <text x="600" y="90" text-anchor="middle" font-family="Manrope, Segoe UI, sans-serif" font-size="46" font-weight="800" fill="#11233c">Direct Device Transfer</text>
  <text x="600" y="132" text-anchor="middle" font-family="Manrope, Segoe UI, sans-serif" font-size="24" font-weight="600" fill="#5c708b">No app installs, no cloud upload, no Bluetooth lag</text>
</svg>
