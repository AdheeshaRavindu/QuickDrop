  <text x="600" y="96" text-anchor="middle" font-family="Manrope, Segoe UI, sans-serif" font-size="44" font-weight="800" fill="#11233c">Send Large Files Online for Free</text>
  <text x="600" y="136" text-anchor="middle" font-family="Manrope, Segoe UI, sans-serif" font-size="24" font-weight="600" fill="#5c708b">No upload queue, no account required</text>
