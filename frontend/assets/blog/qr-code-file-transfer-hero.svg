  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="100%" stop-color="#eefcf4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="180" y="170" width="360" height="360" rx="22" fill="#ffffff" stroke="#cfdff0" stroke-width="8"/>
  <rect x="230" y="220" width="260" height="260" rx="8" fill="#f8fbff"/>
  <rect x="250" y="240" width="60" height="60" fill="#11233c"/>
  <rect x="410" y="240" width="60" height="60" fill="#11233c"/>
